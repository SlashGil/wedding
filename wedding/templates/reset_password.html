<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_login.css') }}">
</head>
<body>
<div class="login-card">
    <h1>Reset Password for {{ user.username }}</h1>
    <p>Enter a new password for the account.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('auth.reset_password', user_id=user.id) }}" method="POST">
        <label for="password">New Password</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Set New Password</button>
    </form>
</div>
</body>
</html>
